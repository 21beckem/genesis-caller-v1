<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genesis Caller</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <div class="header">
      <button id="profile-btn" class="profile-btn">
        <i class="fas fa-user-circle"></i>
      </button>
      <div id="profile-menu" class="profile-menu">
        <button id="settings-link">⚙️ Settings</button>
        <button id="tools-link">🛠️ Tool Library</button>
      </div>
    </div>

    <!-- Content -->
    <div class="content">
      <!-- Main Screen -->
      <div id="main" class="screen">
        <div id="transcript-container"></div>
      </div>

      <!-- Settings Screen -->
      <div id="settings-screen" class="screen">
        <button id="back-from-settings-btn" class="back-btn" data-back-screen="main">Back</button>

        <div class="settings-group">
          <h3>General Settings</h3>

          <div class="form-group">
            <label for="api-key-input">Gemini API Key</label>
            <input id="api-key-input" type="password" placeholder="Paste your API key here">
          </div>

          <a href="#" id="view-usage-link" class="usage-link">View API usage in Google AI Studio</a>

          <div class="form-group">
            <label for="voice-select">Voice</label>
            <select id="voice-select">
              <option value="Zephyr">Zephyr - Bright, Higher pitch</option>
              <option value="Puck">Puck - Upbeat, Middle pitch</option>
              <option value="Charon">Charon - Informative, Lower pitch</option>
              <option value="Kore">Kore - Firm, Middle pitch</option>
              <option value="Fenrir">Fenrir - Excitable, Lower middle pitch</option>
              <option value="Leda">Leda - Youthful, Higher pitch</option>
              <option value="Orus">Orus - Firm, Lower middle pitch</option>
              <option value="Aoede">Aoede - Breezy, Middle pitch</option>
              <option value="Callirrhoe">Callirrhoe - Easy-going, Middle pitch</option>
              <option value="Autonoe">Autonoe - Bright, Middle pitch</option>
              <option value="Enceladus">Enceladus - Breathy, Lower pitch</option>
              <option value="Iapetus">Iapetus - Clear, Lower middle pitch</option>
              <option value="Umbriel">Umbriel - Easy-going, Lower middle pitch</option>
              <option value="Algieba">Algieba - Smooth, Lower pitch</option>
              <option value="Despina">Despina - Smooth, Middle pitch</option>
              <option value="Erinome">Erinome - Clear, Middle pitch</option>
              <option value="Algenib">Algenib - Gravelly, Lower pitch</option>
              <option value="Rasalgethi">Rasalgethi - Informative, Middle pitch</option>
              <option value="Laomedeia">Laomedeia - Upbeat, Higher pitch</option>
              <option value="Achernar">Achernar - Soft, Higher pitch</option>
              <option value="Alnilam">Alnilam - Firm, Lower middle pitch</option>
              <option value="Schedar">Schedar - Even, Lower middle pitch</option>
              <option value="Gacrux">Gacrux - Mature, Middle pitch</option>
              <option value="Pulcherrima">Pulcherrima - Forward, Middle pitch</option>
              <option value="Achird">Achird - Friendly, Lower middle pitch</option>
              <option value="Zubenelgenubi">Zubenelgenubi - Casual, Lower middle pitch</option>
              <option value="Vindemiatrix">Vindemiatrix - Gentle, Middle pitch</option>
              <option value="Sadachbia">Sadachbia - Lively, Lower pitch</option>
              <option value="Sadaltager">Sadaltager - Knowledgeable, Middle pitch</option>
              <option value="Sulafat">Sulafat - Warm, Middle pitch</option>
            </select>
          </div>

          <button id="save-api-key-btn" class="save-btn">Save Settings</button>
        </div>

        <div class="settings-group">
          <h3>Tool Settings</h3>
          <div id="tool-settings-container"></div>
        </div>
      </div>

      <!-- Tool Settings Screen -->
      <div id="tool-settings-screen" class="screen">
        <button id="back-from-tool-settings-btn" class="back-btn" data-back-screen="main">Back</button>
        <h3 id="tool-settings-title"></h3>
        <div id="tool-fields-container"></div>
        <button id="save-tool-settings-btn" class="save-btn">Save Tool Settings</button>
      </div>

      <!-- Tools Library Screen -->
      <div id="tools-library-screen" class="screen">
        <button id="back-from-tools-btn" class="back-btn" data-back-screen="main">Back</button>
        <h3>Available Tools</h3>
        <div id="tools-list-container"></div>
      </div>
    </div>

    <!-- Controls Row -->
    <div id="controls-row" class="controls-row">
      <div id="normal-controls">
        <button id="start-call-btn" class="control-btn">
          <i class="fas fa-phone"></i> Start Call
        </button>
      </div>
      <div id="call-controls">
        <button id="mute-btn" class="control-btn">
          <i class="fas fa-microphone"></i>
        </button>
        <button id="end-call-btn" class="control-btn">
          <i class="fas fa-phone-slash"></i> End Call
        </button>
      </div>
    </div>
  </div>

  <!-- Tool Popup -->
  <div id="tool-popup" class="popup">
    <div class="popup-content">
      <div class="popup-header" id="tool-popup-name"></div>
      <div class="popup-description" id="tool-popup-description"></div>
      <div class="popup-toggle">
        <input id="tool-popup-toggle" type="checkbox">
        <span>Enabled</span>
      </div>
      <a href="#" id="tool-popup-settings-link" class="popup-settings-link">Configure Settings</a>
    </div>
  </div>

  <script type="module">
    import { App } from './js/app/App.js';

    const app = new App();
    window.app = app;

    // Show main screen on load
    app.ui.showScreen('main');
  </script>
</body>
</html>
